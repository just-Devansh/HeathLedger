<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Heath Ledger</title>
    <meta name="description" content="Fast, minimal expense tracking" />

    <!-- PWA / theme -->
    <meta name="theme-color" content="#0c0a18" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />

    <!-- iOS / iPadOS home screen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Kharcha" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Android Chrome -->
    <meta name="mobile-web-app-capable" content="yes" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Sans+Devanagari:wght@700;900&family=Space+Grotesk:wght@500;600;700;800&display=swap" rel="stylesheet">
    <script>
      (function () {
        var theme = localStorage.getItem('heath_ledger_theme') || 'blue'
        var darkRaw = localStorage.getItem('heath_ledger_dark')
        var isDark = darkRaw !== null
          ? darkRaw === 'true'
          : window.matchMedia('(prefers-color-scheme: dark)').matches
        var bgs = {
          'blue-light': '#f1f5ff', 'blue-dark': '#0d0d1f',
          'green-light': '#f0fdf4', 'green-dark': '#071a0d',
          'black-light': '#f8fafc', 'black-dark': '#09090b',
        }
        document.body.style.background = bgs[theme + '-' + (isDark ? 'dark' : 'light')] || '#f1f5ff'
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
