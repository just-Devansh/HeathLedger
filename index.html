<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HeathLedger</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700;800&display=swap" rel="stylesheet">
    <script>
      (function () {
        var theme = localStorage.getItem('heath_ledger_theme') || 'blue'
        var darkRaw = localStorage.getItem('heath_ledger_dark')
        var isDark = darkRaw !== null
          ? darkRaw === 'true'
          : window.matchMedia('(prefers-color-scheme: dark)').matches
        var bgs = {
          'blue-light': '#f1f5ff', 'blue-dark': '#0d0d1f',
          'green-light': '#f0fdf4', 'green-dark': '#071a0d',
          'black-light': '#f8fafc', 'black-dark': '#09090b',
        }
        document.body.style.background = bgs[theme + '-' + (isDark ? 'dark' : 'light')] || '#f1f5ff'
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
